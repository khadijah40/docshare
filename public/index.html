<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocShare</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Google Fonts: clean monospace + geometric sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ============================================================
       LOGIN SCREEN
       Shown first. Hidden after correct password is entered.
  ============================================================ -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">DocShare</span>
      </div>
      <p class="subtitle">Private document sharing for two.</p>

      <div class="input-group">
        <input
          type="password"
          id="password-input"
          placeholder="Enter password"
          autocomplete="current-password"
        />
        <button id="login-btn" onclick="handleLogin()">Enter</button>
      </div>

      <!-- Error message shown on wrong password -->
      <p id="login-error" class="error-msg hidden">Wrong password. Try again.</p>
    </div>
  </div>


  <!-- ============================================================
       DASHBOARD SCREEN
       Shown after successful login.
  ============================================================ -->
  <div id="dashboard-screen" class="screen hidden">

    <!-- Top navigation bar -->
    <nav class="navbar">
      <div class="nav-brand">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">DocShare</span>
      </div>
      <button class="logout-btn" onclick="handleLogout()">Lock</button>
    </nav>

    <main class="dashboard">

      <!-- ── Upload Section ── -->
      <section class="card upload-section">
        <h2 class="section-title">Upload a File</h2>

        <!-- Drag-and-drop zone -->
        <div
          id="drop-zone"
          class="drop-zone"
          onclick="document.getElementById('file-input').click()"
          ondragover="handleDragOver(event)"
          ondragleave="handleDragLeave(event)"
          ondrop="handleDrop(event)"
        >
          <span class="drop-icon">↑</span>
          <p>Click or drag a file here</p>
          <p class="drop-hint">PDF, DOCX, TXT, PNG, JPG — max 10 MB</p>
        </div>

        <!-- Hidden real file input -->
        <input
          type="file"
          id="file-input"
          class="hidden"
          accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.gif,.webp"
          onchange="handleFileSelect(event)"
        />

        <!-- Shows the selected file name before upload -->
        <div id="selected-file" class="selected-file hidden">
          <span id="selected-file-name"></span>
          <button class="upload-btn" onclick="uploadFile()">Upload</button>
        </div>

        <!-- Upload progress / status message -->
        <div id="upload-status" class="upload-status hidden"></div>
      </section>


      <!-- ── Files List Section ── -->
      <section class="card files-section">
        <div class="files-header">
          <h2 class="section-title">Shared Files</h2>
          <button class="refresh-btn" onclick="loadFiles()" title="Refresh">↻</button>
        </div>

        <!-- Loading indicator -->
        <div id="files-loading" class="loading-msg">Loading files…</div>

        <!-- Empty state -->
        <div id="files-empty" class="empty-msg hidden">No files yet. Upload something!</div>

        <!-- File cards are injected here by JavaScript -->
        <div id="files-list" class="files-list"></div>
      </section>

    </main>
  </div>


  <!-- ============================================================
       CONFIRMATION MODAL (for delete)
  ============================================================ -->
  <div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <p>Delete this file? This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-delete" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>


  <!-- Main JavaScript -->
  <script src="js/app.js"></script>
</body>
</html>
